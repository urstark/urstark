<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live README Preview</title>
    
    <!-- GitHub Markdown CSS for accurate preview -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown-dark.min.css">
    
    <!-- Marked.js for parsing markdown to HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- DOMPurify to sanitize HTML and prevent XSS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>
        :root {
            --bg-color: #0d1117;
            --header-bg: #010409;
            --text-color: #c9d1d9;
            --border-color: #30363d;
            --accent-color: #58a6ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--header-bg);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .preview-pane {
            flex: 1;
            overflow-y: auto;
            background-color: var(--bg-color);
        }

        #preview-output {
            padding: 32px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #666; }
    </style>
</head>
<body>
    <header>
        <h1>Live README Preview (Auto-Syncs with README.md)</h1>
        <div style="font-size: 0.9em; color: #8b949e;">Edit README.md in your IDE, and this page will update automatically!</div>
    </header>
    <main class="preview-pane">
        <div id="preview-output" class="markdown-body">Loading README.md...</div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const output = document.getElementById('preview-output');
            let lastContent = '';

            marked.setOptions({
                gfm: true,
                breaks: true
            });

            function renderMarkdown(markdownText) {
                const rawHtml = marked.parse(markdownText);
                output.innerHTML = DOMPurify.sanitize(rawHtml, {
                    ADD_TAGS: ['iframe'],
                    ADD_ATTR: ['allow', 'allowfullscreen', 'frameborder', 'scrolling', 'align']
                });
            }

            // Poll the local README.md file every second to create a live-sync preview
            setInterval(() => {
                // cache busting to ensure we get the fresh file
                fetch('README.md?t=' + new Date().getTime())
                    .then(res => {
                        if (res.ok) return res.text();
                        throw new Error('Not found');
                    })
                    .then(text => {
                        if (text !== lastContent) {
                            lastContent = text;
                            renderMarkdown(text);
                        }
                    })
                    .catch(err => {
                        console.error('Error fetching README.md', err);
                        if (lastContent === '') {
                            output.innerHTML = `<div style="color: #ff7b72;">
                                <h3>Could not load README.md</h3>
                                <p>Make sure you are running a local HTTP server in your project directory.</p>
                                <p>Run: <code>python3 -m http.server 8000</code> in your terminal and visit <code>http://localhost:8000/live-editor.html</code></p>
                            </div>`;
                        }
                    });
            }, 1000);
        });
    </script>
</body>
</html>
